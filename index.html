<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minesweeper</title>
  <link rel="stylesheet" href="styles.css?v=20260404-2">
  <link rel="icon" href="images/minesweeper-nbg-w.png" type="image/x-icon">
</head>
<body>

  <div id="header">
    <div class="logo-bar">

      <div id="Brand-logo">
        <img src="images/C2-dark.png" alt="Brand logo">
      </div>

      <div id="Website-logo">
        <img src="images/minesweeper-nbg-w.png" alt="Website logo">
      </div>

    </div>
    


    <div>
      <h1>Minesweeper</h1>

      <div id="game-info" aria-live="polite">
        <span>Time: <span id="timer">0</span>s</span>
        <span>Mines left: <span id="mineCounter">0</span></span>
        <div>Best Time: <span id="bestTime">--</span>s</div>
      </div>

      <div class="controls">
        <div class="mainControls">
          <label for="difficulty">Difficulty: </label>
          <select id="difficulty">
            <option value="8x10">Easy</option>
            <option value="14x36">Medium</option>
            <option value="20x70">Hard</option>
            <option value="custom">Custom</option>
          </select>
      
          <button id="resetBtn">Reset</button>
          <!--

          <label>
            <input type="checkbox" id="hardModeCheckbox" />
            Hard Mode (no flags)
          </label>
          -->
        </div>
      
        <div id="customInputs" hidden>
          <input type="number" id="customSize" placeholder="Board Size" min="2" max="24" inputmode="numeric" />
          <input type="number" id="customMines" placeholder="Mine Count" min="1" inputmode="numeric" />
          <button id="applyBtn" type="button">Apply</button>
        </div>
      </div>
    </div>
  </div>

  <div class="board-wrapper">
    <div id="board"></div>
  </div>
    

    <div id="popup" class="hidden">
        <div id="popup-content">
          <h2 id="popup-message">Game Over!</h2>
          <button id="popup-restart" type="button">Close</button>
          <button id="popupResetBtn" type="button">New Game</button>
        </div>
    </div>

    <div id="debug-menu" class="hidden">
      <h3>Debug Menu</h3>
      <button type="button" onclick="debugWin()">Trigger Win</button>
      <button type="button" onclick="debugLose()">Trigger Loss</button>
      <button type="button" onclick="resetGame()">Reset Game</button>
      <button type="button" onclick="confettiEffect()">Test Confetti</button>
    </div>

    <footer>
      <div class="left-content">
          <img src="images/C2-dark.png" alt="Logo">
          <span>A Product of Continental Games</span>
      </div>
      <div class="center-content">
          <p>
              © 2025 PClaystation |
              <a href="https://github.com/PClaystation" target="_blank" rel="noreferrer">GitHub</a>
          </p>
      </div>
      <div class="right-content">
          <a href="https://patreon.com/ContinentalStudios?utm_medium=unknown&utm_source=join_link&utm_campaign=creatorshare_creator&utm_content=copyLink" target="_blank" rel="noreferrer">
              <img src="images/patreon.svg" alt="Logo">
          </a>
          <a href="https://gofund.me/5a43d215" target="_blank" rel="noreferrer">
              <img src="images/gofundme2.svg" alt="Logo">
          </a>
      </div>
      </footer>

    <script src="script.js?v=20260404-2"></script>
  </body>
  
</html>
